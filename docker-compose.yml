version: "3.9"

services:
  # ─── ElizaOS Agent (Don Roneth) ──────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3instant-agent
    restart: unless-stopped
    ports:
      - "3000:3000"   # ElizaOS chat API
      - "3002:3002"   # LLM proxy (internal, optional)
    env_file:
      - .env
    environment:
      - SERVER_PORT=3000
      - LLM_PROXY_PORT=3002
      - WEB3INSTANT_API_URL=http://frontend:3001
    volumes:
      - agent-data:/app/data
    depends_on:
      - frontend

  # ─── Web3Instant Frontend (Next.js) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: web3instant-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - frontend/.env.local
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0

volumes:
  agent-data:
